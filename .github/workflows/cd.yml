name: Continuous Deployment

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID:  ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: fabriciolages-projects

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable
      
      - name: Install dependencies
        run: yarn install
      - name: Run unit tests
        run: yarn test
  
  build-and-deploy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url}}

    steps:
      - name: Checkout Preview
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Pull Vercel config Preview
        run: |
          yarn vercel pull --yes \
          --environment=preview \
          --token=${{ secrets.VERCEL_TOKEN }} \
          --scope=$VERCEL_SCOPE  

      - name: Build Vercel
        run: yarn vercel build --token=${{ secrets.VERCEL_TOKEN }} --scope=$VERCEL_SCOPE

      - name: Deploy Vercel
        id: deploy
        run: |
          URL=$(yarn --silent vercel deploy --prebuilt \
          --target=preview \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: Run E2E Tests
    needs: [build-and-deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Install Playwright Browser
        run: yarn playwright install --with-deps chromium

      - name: Run E2E Regression Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.deployment-url }}
          DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}

      - name: Upload Playwright report
        if: ${{ !cancelled()}}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report

      - name: Publish TestDino Report
        if: ${{ !cancelled()}}
        run: npx tdpw upload ./playwright-report --token=${{ secrets.TD_TOKEN }}

  promote:
    name: Promote to Production
    needs: [e2e-tests, build-and-deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Production
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Pull Vercel Production config
        run: |
          yarn vercel pull --yes \
          --environment=production \
          --token=${{ secrets.VERCEL_TOKEN }} \
          --scope=$VERCEL_SCOPE

      - name: Build Vercel Production
        run: yarn vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=$VERCEL_SCOPE
      - name: Deploy Vercel Production
        run: |
          yarn vercel deploy --prebuilt --prod \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE